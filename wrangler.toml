name = "summit-sales-invite-bot"
pages_build_output_dir = "public"
compatibility_date = "2024-12-01"

[vars]
# 初始 superadmin user_code 清單（逗號分隔），啟動時會自動 upsert 進 user_roles
INITIAL_SUPERADMINS = "16890"
# 單一檔案上傳上限（byte）—— 15 MB
MAX_UPLOAD_SIZE = "15728640"

[[d1_databases]]
binding = "DB"
database_name = "summit-db"
database_id = "d5d45e2f-71a1-41c9-8f37-2ce575020089"

[[r2_buckets]]
binding = "RESOURCES"
bucket_name = "summit-resources"
