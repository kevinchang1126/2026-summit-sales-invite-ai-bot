<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026 鼎新企業高峰年會 — 活動資源中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="resources.css">
  <style>
    #auth-overlay {
      position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #auth-overlay h2 { color: #333; margin-bottom: 10px; }
    #auth-overlay p { color: #666; margin-bottom: 20px; text-align: center; padding: 0 20px; }
  </style>
</head>

<body>
  <!-- 驗證畫面 -->
  <div id="auth-overlay">
    <div class="spinner" style="width:40px;height:40px;border-width:4px;border-color:var(--primary) transparent transparent transparent;margin-bottom:20px;"></div>
    <h2>身分驗證中...</h2>
    <p id="auth-message">正在驗證您的身分，請稍候</p>
  </div>

  <div id="app-container" style="display:none;">
    <!-- 頂部列 -->
    <header class="header rc-header">
      <div class="header-inner">
        <div class="rc-header-row">
          <a href="/" class="rc-back" aria-label="返回首頁">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            返回
          </a>
          <h1 class="logo rc-title">📚 活動資源中心</h1>
          <span class="rc-user" id="rc-user"></span>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- ===== 篩選面板 ===== -->
      <section class="card rc-filter">
        <!-- 活動 + 數量 -->
        <div class="rc-filter-row rc-filter-grid">
          <div class="rc-filter-item">
            <label for="filter-event">活動</label>
            <select id="filter-event">
              <option value="">全部顯示中活動</option>
            </select>
          </div>
          <div class="rc-filter-item rc-filter-item-sm">
            <label for="filter-event-count">範圍</label>
            <select id="filter-event-count">
              <option value="5" selected>最近 5 場</option>
              <option value="10">最近 10 場</option>
              <option value="20">最近 20 場</option>
              <option value="all">全部活動</option>
            </select>
          </div>
        </div>

        <!-- 資源類型 -->
        <div class="rc-filter-row">
          <div class="rc-filter-head"><label>資源類型</label></div>
          <div class="rc-chip-group" id="filter-type">
            <button type="button" class="rc-chip active" data-type="">全部</button>
            <button type="button" class="rc-chip" data-type="article">📄 文章</button>
            <button type="button" class="rc-chip" data-type="slide">📊 簡報</button>
            <button type="button" class="rc-chip" data-type="video">🎬 影片</button>
            <button type="button" class="rc-chip" data-type="other">📎 其他</button>
          </div>
        </div>

        <!-- 關鍵字 -->
        <div class="rc-filter-row">
          <label for="filter-keyword" class="rc-filter-head">關鍵字</label>
          <input type="text" id="filter-keyword" placeholder="搜尋標題或說明" autocomplete="off">
        </div>

        <!-- 標籤 -->
        <div class="rc-filter-row">
          <div class="rc-filter-head">
            <label>標籤</label>
            <div class="rc-mode-toggle" role="radiogroup" aria-label="標籤匹配模式">
              <button type="button" class="rc-mode-btn active" data-mode="or" id="mode-or" title="符合任一選中標籤即顯示">任一符合 (OR)</button>
              <button type="button" class="rc-mode-btn" data-mode="and" id="mode-and" title="必須同時符合所有選中標籤">全部符合 (AND)</button>
            </div>
          </div>
          <div id="filter-tags" class="rc-tag-groups">
            <div class="loading-placeholder" style="padding:12px;">載入標籤中...</div>
          </div>
        </div>

        <!-- 操作列 -->
        <div class="rc-filter-row rc-filter-actions">
          <span class="rc-result-count" id="rc-result-count"></span>
          <button type="button" class="btn-secondary" id="btn-clear-filters">清除所有篩選</button>
        </div>
      </section>

      <!-- ===== 資源列表 ===== -->
      <section id="rc-list" class="rc-resource-list">
        <div class="loading-placeholder">載入中...</div>
      </section>
    </main>

    <!-- ===== 預覽 Modal ===== -->
    <div id="rc-preview-modal" class="rc-preview-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="資源預覽">
      <div class="rc-preview-inner">
        <div class="rc-preview-header">
          <span class="rc-preview-title" id="rc-preview-title"></span>
          <div class="rc-preview-actions">
            <div id="rc-pdf-controls" class="rc-pdf-controls" style="display:none">
              <button class="rc-preview-btn" id="rc-pdf-prev" disabled>‹</button>
              <span id="rc-pdf-page-info" class="rc-pdf-page-info">1 / 1</span>
              <button class="rc-preview-btn" id="rc-pdf-next" disabled>›</button>
            </div>
            <button class="rc-preview-btn" id="rc-preview-download" title="下載">⬇ 下載</button>
            <button class="rc-preview-btn rc-preview-close" id="rc-preview-close" title="關閉">✕</button>
          </div>
        </div>
        <div class="rc-preview-body" id="rc-preview-body">
          <div class="rc-preview-loading" id="rc-preview-loading">
            <div class="spinner" style="width:36px;height:36px;border-width:4px;border-color:var(--primary) transparent transparent transparent;"></div>
            <p style="margin-top:12px;color:var(--text-secondary);font-size:0.9rem;">載入中，請稍候…</p>
          </div>
          <div class="rc-pdf-canvas-wrap" id="rc-pdf-container" style="display:none">
            <canvas id="rc-pdf-canvas"></canvas>
          </div>
          <iframe id="rc-preview-iframe" src="" style="display:none" title="預覽"></iframe>
          <img id="rc-preview-img" src="" style="display:none;max-width:100%;max-height:100%;object-fit:contain;" alt="預覽圖片">
          <video id="rc-preview-video" controls style="display:none;max-width:100%;max-height:100%;"></video>
          <div class="rc-preview-unsupported" id="rc-preview-unsupported" style="display:none">
            <p style="font-size:2rem;margin-bottom:8px;">📎</p>
            <p style="font-weight:600;margin-bottom:6px;">此格式無法直接預覽</p>
            <p style="font-size:0.85rem;color:var(--text-secondary);">請點「下載」後以對應應用程式開啟</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 篩選收合懸浮提示列 -->
    <div id="rc-filter-bar" class="rc-filter-bar" style="display:none">
      <span id="rc-filter-bar-summary" class="rc-filter-bar-summary"></span>
      <button type="button" id="rc-filter-bar-expand" class="rc-filter-bar-btn">展開篩選 ▾</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="resources.js"></script>
</body>

</html>
